<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Reports Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --bg2: #1e293b;
            --text: #f1f5f9;
            --text2: #94a3b8;
            --muted: #64748b;
            --blue: #3b82f6;
            --purple: #8b5cf6;
            --green: #10b981;
            --border: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 48px;
            max-width: 600px;
        }

        .logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--blue), var(--purple));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 20px;
            box-shadow: 0 8px 32px rgba(59, 130, 246, 0.3);
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text2);
            font-size: 1rem;
        }

        .reports-grid {
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .report-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px 28px;
            text-decoration: none;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .report-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(180deg, var(--blue), var(--purple));
            opacity: 0;
            transition: opacity 0.25s;
        }

        .report-card:hover {
            transform: translateY(-2px);
            border-color: rgba(59, 130, 246, 0.4);
            box-shadow: 0 8px 32px rgba(59, 130, 246, 0.15);
        }

        .report-card:hover::before {
            opacity: 1;
        }

        .report-icon {
            width: 48px;
            height: 48px;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .report-info {
            flex: 1;
        }

        .report-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .report-meta {
            font-size: 0.85rem;
            color: var(--muted);
        }

        .report-arrow {
            color: var(--muted);
            font-size: 1.2rem;
            transition: transform 0.25s, color 0.25s;
        }

        .report-card:hover .report-arrow {
            transform: translateX(4px);
            color: var(--blue);
        }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-new {
            background: rgba(16, 185, 129, 0.15);
            color: var(--green);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .footer {
            margin-top: 64px;
            text-align: center;
            color: var(--muted);
            font-size: 0.8rem;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="logo">📊</div>
        <h1>Campaign Reports</h1>
        <p class="subtitle">Báo cáo hiệu quả chiến dịch quảng cáo hàng tuần</p>
    </div>

    <div class="reports-grid">
        <!-- ===== ADD NEW REPORTS HERE ===== -->

        <a href="./week-11/" class="report-card">
            <div class="report-icon">📈</div>
            <div class="report-info">
                <div class="report-title">
                    Tuần 11 — 08/03 → 14/03/2026
                    <span class="badge badge-new">Mới</span>
                </div>
                <div class="report-meta">Phân tích MQL & %MQL theo campaign · Facebook & Google Ads</div>
            </div>
            <span class="report-arrow">→</span>
        </a>

        <!-- ===== TEMPLATE (copy & paste for new weeks) =====
        <a href="./week-XX/" class="report-card">
            <div class="report-icon">📈</div>
            <div class="report-info">
                <div class="report-title">Tuần XX — DD/MM → DD/MM/2026</div>
                <div class="report-meta">Mô tả ngắn</div>
            </div>
            <span class="report-arrow">→</span>
        </a>
        ===== END TEMPLATE ===== -->
    </div>

    <div class="footer">
        <p>© 2026 Campaign Performance Reports</p>
    </div>
</body>

</html>
